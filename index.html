<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titan AI</title>
</head>
<body style="background:black;color:white;text-align:center;font-family:sans-serif;padding-top:40px;">

  <h1>🚀 Titan AI Hub</h1>
  <p>Whale Tracking + AI Signal</p>

  <h2 id="price">BTC: Loading...</h2>

  <h2 id="signal" style="color:lime;">WAIT</h2>
  <p id="confidence">Confidence: 70%</p>
  <p id="whale">Whale: Loading...</p>

  <script>
    let prices = [];

    async function updateData() {
      try {
        const res = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT");
        const data = await res.json();

        let price = parseFloat(data.lastPrice);
        let volume = parseFloat(data.volume);

        document.getElementById("price").innerText = "BTC: $" + price.toFixed(0);

        prices.push(price);
        if (prices.length > 10) prices.shift();

        let signal = "WAIT";
        let confidence = 70;

        if (prices.length >= 5) {
          let avg = prices.reduce((a, b) => a + b, 0) / prices.length;

          if (price > avg && volume > 1000) {
            signal = "BUY";
            confidence = 85 + Math.random() * 10;
          } else if (price < avg && volume > 1000) {
            signal = "SELL";
            confidence = 85 + Math.random() * 10;
          }
        }

        document.getElementById("signal").innerText = signal;
        document.getElementById("signal").style.color =
          signal === "BUY" ? "lime" :
          signal === "SELL" ? "red" : "white";

        document.getElementById("confidence").innerText =
          "Confidence: " + Math.floor(confidence) + "%";

        // ตัวอย่าง Whale ชั่วคราว
        if (volume > 50000) {
          document.getElementById("whale").innerText = "Whale: Large market activity detected";
        } else {
          document.getElementById("whale").innerText = "Whale: No unusual whale activity";
        }

      } catch (e) {
        document.getElementById("price").innerText = "Error loading BTC price";
        document.getElementById("signal").innerText = "ERROR";
        document.getElementById("signal").style.color = "orange";
        document.getElementById("confidence").innerText = "Confidence: -";
        document.getElementById("whale").innerText = "Whale: Error loading data";
      }
    }

    setInterval(updateData, 5000);
    updateData();
  </script>

</body>
</html>
