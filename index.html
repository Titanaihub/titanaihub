<!doctype html>
<html>
<head>
  <title>Titan AI</title>
</head>
<body style="background:black;color:white;text-align:center;font-family:sans-serif">

<h1>🚀 Titan AI Hub</h1>
<p>Whale Tracking + AI Signal</p>

<h2 id="price">BTC: Loading...</h2>

<h2 id="signal" style="color:lime;">WAIT</h2>
<p id="confidence">Confidence: 70%</p>

<script>
let lastPrice = null;

async function updateData() {
  try {
    const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
    const data = await res.json();
    let price = parseFloat(data.price || 0);

    document.getElementById("price").innerText = "BTC: $" + price.toFixed(0);

    let signal = "WAIT";
    let confidence = 70;

    if (lastPrice !== null) {
      if (price > lastPrice) {
        signal = "BUY";
        confidence = 85;
      } else if (price < lastPrice) {
        signal = "SELL";
        confidence = 85;
      }
    }

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").style.color =
      signal === "BUY" ? "lime" :
      signal === "SELL" ? "red" : "white";

    document.getElementById("confidence").innerText =
      "Confidence: " + confidence + "%";

    lastPrice = price;
  } catch (e) {
    document.getElementById("price").innerText = "Error loading data";
  }
}

setInterval(updateData, 5000);
updateData();
</script>

</body>
</html>
