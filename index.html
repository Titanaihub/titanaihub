<!doctype html>
<html>
<head>
  <title>Titan AI Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: Arial;
    }

    h1 {
      text-align: center;
      color: gold;
      margin: 20px 0;
    }

    .grid {
      display: grid;
      gap: 15px;
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(255,215,0,0.15);
    }

    .title {
      color: gold;
      font-size: 18px;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
    }

    .signal {
      font-size: 26px;
      font-weight: bold;
    }

    .buy { color: lime; }
    .sell { color: red; }
    .wait { color: gray; }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    td {
      padding: 6px;
      border-bottom: 1px solid #333;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h1>🚀 Titan AI Hub</h1>

<div class="grid">

  <!-- BTC -->
  <div class="card">
    <div class="title">BTC</div>
    <div id="btc-price" class="price"></div>
    <div id="btc-signal" class="signal"></div>
    <div id="btc-confidence"></div>
  </div>

  <!-- ETH -->
  <div class="card">
    <div class="title">ETH</div>
    <div id="eth-price" class="price"></div>
    <div id="eth-signal" class="signal"></div>
    <div id="eth-confidence"></div>
  </div>

  <!-- BNB -->
  <div class="card">
    <div class="title">BNB</div>
    <div id="bnb-price" class="price"></div>
    <div id="bnb-signal" class="signal"></div>
    <div id="bnb-confidence"></div>
  </div>

  <!-- MARKET -->
  <div class="card">
    <div class="title">Market Insight</div>
    <div id="market"></div>
  </div>

  <!-- PERFORMANCE -->
  <div class="card">
    <div class="title">Performance</div>
    <div id="stats"></div>
    <table id="perf"></table>
  </div>

</div>

<script>

async function get(url){
  return fetch(url).then(r=>r.json());
}

function setUI(prefix,data){
  document.getElementById(prefix+"-price").innerText = "$"+data.price;

  let el = document.getElementById(prefix+"-signal");
  el.innerText = data.signal;
  el.className = "signal "+data.signal.toLowerCase();

  document.getElementById(prefix+"-confidence").innerText =
    "Confidence: "+data.confidence+"%";
}

async function update(){
  try{

    const btc = await get("/api/signal-btc");
    const eth = await get("/api/signal-eth");
    const bnb = await get("/api/signal-bnb");

    setUI("btc",btc);
    setUI("eth",eth);
    setUI("bnb",bnb);

    // Market Insight
    let buy = [btc,eth,bnb].filter(x=>x.signal==="BUY").length;
    let sell = [btc,eth,bnb].filter(x=>x.signal==="SELL").length;

    let market = "Sideway";
    if(buy>=2) market="Bullish 🟢";
    if(sell>=2) market="Bearish 🔴";

    document.getElementById("market").innerText = market;

    // Performance
    const perf = await get("/api/performance");

    document.getElementById("stats").innerText =
      `Winrate: ${perf.winrate}% | PnL: ${perf.totalPnl}`;

    let html="";
    perf.trades.forEach(t=>{
      html+=`<tr>
        <td>${t.symbol}</td>
        <td>${t.result}</td>
        <td>${t.pnl}</td>
      </tr>`;
    });

    document.getElementById("perf").innerHTML = html;

  }catch(e){
    console.log(e);
  }
}

setInterval(update,5000);
update();

</script>

</body>
</html>
