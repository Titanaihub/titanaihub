<!doctype html>
<html>
<head>
  <title>Titan AI Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: Arial;
    }

    h1 {
      text-align: center;
      color: gold;
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(255,215,0,0.15);
    }

    .title {
      font-size: 18px;
      color: gold;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
    }

    .signal {
      font-size: 28px;
      font-weight: bold;
    }

    .buy { color: lime; }
    .sell { color: red; }
    .wait { color: gray; }

    .row {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 14px;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    td {
      padding: 6px;
      border-bottom: 1px solid #333;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h1>🚀 Titan AI Hub</h1>

<div class="grid">

  <!-- BTC -->
  <div class="card">
    <div class="title">BTC</div>
    <div id="btc-price" class="price">Loading...</div>
    <div id="btc-signal" class="signal wait">WAIT</div>
    <div id="btc-confidence"></div>
  </div>

  <!-- ETH -->
  <div class="card">
    <div class="title">ETH</div>
    <div id="eth-price" class="price">Loading...</div>
    <div id="eth-signal" class="signal wait">WAIT</div>
    <div id="eth-confidence"></div>
  </div>

  <!-- BNB -->
  <div class="card">
    <div class="title">BNB</div>
    <div id="bnb-price" class="price">Loading...</div>
    <div id="bnb-signal" class="signal wait">WAIT</div>
    <div id="bnb-confidence"></div>
  </div>

  <!-- MARKET -->
  <div class="card">
    <div class="title">AI Market Insight</div>
    <div id="market">Analyzing...</div>
  </div>

  <!-- PERFORMANCE -->
  <div class="card">
    <div class="title">Performance</div>
    <table id="perf"></table>
  </div>

</div>

<script>

async function fetchSignal(url) {
  const r = await fetch(url);
  return await r.json();
}

function setUI(prefix, data) {
  document.getElementById(prefix+"-price").innerText =
    "$" + Math.round(data.price);

  let el = document.getElementById(prefix+"-signal");
  el.innerText = data.signal;
  el.className = "signal " + data.signal.toLowerCase();

  document.getElementById(prefix+"-confidence").innerText =
    "Confidence: " + data.confidence + "%";
}

async function update() {
  try {

    const btc = await fetchSignal("/api/signal-btc");
    const eth = await fetchSignal("/api/signal-eth");
    const bnb = await fetchSignal("/api/signal-bnb");

    setUI("btc", btc);
    setUI("eth", eth);
    setUI("bnb", bnb);

    // Market Insight
    let buy = [btc, eth, bnb].filter(x=>x.signal==="BUY").length;
    let sell = [btc, eth, bnb].filter(x=>x.signal==="SELL").length;

    let text = "Sideway";

    if (buy >= 2) text = "Bullish 🟢";
    if (sell >= 2) text = "Bearish 🔴";

    document.getElementById("market").innerText = text;

    // Performance
    const perf = await fetch("/api/performance").then(r=>r.json());

    let html = "";
    perf.trades.forEach(t=>{
      html += `<tr><td>${t.time}</td><td>${t.result}</td></tr>`;
    });

    document.getElementById("perf").innerHTML = html;

  } catch (e) {
    console.log(e);
  }
}

setInterval(update, 5000);
update();

</script>

</body>
</html>
